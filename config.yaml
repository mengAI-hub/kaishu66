model_name_or_path: Qwen/Qwen2.5-7B-Instruct

train_file: data/sft_allusion.jsonl
output_dir: outputs/lora_poetry

max_seq_length: 2048
num_train_epochs: 5
per_device_train_batch_size: 1
gradient_accumulation_steps: 16
learning_rate: 0.0002
warmup_ratio: 0.05
lr_scheduler_type: cosine
logging_steps: 10
save_steps: 100
save_total_limit: 2

use_4bit: true
lora_r: 8
lora_alpha: 32
lora_dropout: 0.1
target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj

seed: 42
